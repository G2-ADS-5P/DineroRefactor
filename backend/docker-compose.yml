x-service-defaults: &service-defaults
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - school-control

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - school-control

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      start_period: 30s
      timeout: 20s
      retries: 12
    networks:
      - school-control

  adminer:
    image: adminer:4.8.1-standalone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    networks:
      - school-control

  academic:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: academic
    environment:
      PORT: 4001
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/school_academic
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4001:4001"
    command: sh -c "npm run db:migrate && npm run start:prod"

  class-offering:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: class-offering
    environment:
      PORT: 4002
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/school_class_offering
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4002:4002"
    command: sh -c "npm run db:migrate && npm run start:prod"

  enrollment:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: enrollment
    environment:
      PORT: 4003
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/school_enrollment
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4003:4003"
    command: sh -c "npm run db:migrate && npm run start:prod"

  attendance:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: attendance
    environment:
      PORT: 4004
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/school_attendance
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4004:4004"
    command: sh -c "npm run db:migrate && npm run start:prod"

  user-auth:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: user-auth
    environment:
      PORT: 4005
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/school_user_auth
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4005:4005"
    command: sh -c "npm run db:migrate && npm run start:prod"

  identity:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: identity
    environment:
      PORT: 4006
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dinero_identity
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4006:4006"
    command: sh -c "npm run db:migrate && npm run start:prod"

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  school-control:
