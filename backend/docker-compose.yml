x-service-defaults: &service-defaults
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  networks:
    - dinero-network

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dinero-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      start_period: 30s
      timeout: 20s
      retries: 12
    networks:
      - dinero-network

  adminer:
    image: adminer:4.8.1-standalone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    networks:
      - dinero-network

  openfinance:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: openfinance
    environment:
      PORT: 4006
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dinero_openfinance
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4006:4006"
    command: sh -c "npm run db:migrate && npm run start:prod"

  portfolio:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: portfolio
    environment:
      PORT: 4007
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dinero_portfolio
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      BRAPI_TOKEN: fh3HFHiU1EGqUnU1FH2a7m
    ports:
      - "4007:4007"
    command: sh -c "npm run db:migrate && npm run start:prod"

  identity:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: identity
    environment:
      PORT: 4008
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dinero_identity
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4008:4008"
    command: sh -c "npm run db:migrate && npm run start:prod"

  financial:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: financial
    environment:
      PORT: 4009
      JWT_SECRET: super-secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dinero_financial
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4009:4009"
    command: sh -c "npm run db:migrate && npm run start:prod"

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  dinero-network:
