name: Enforce dev -> main PRs

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if PR is not from dev
        if: github.event.pull_request.head.ref != 'dev'
        run: |
          echo "Erro: PRs para 'main' devem vir exclusivamente da branch 'dev'."
          echo "Branch atual: ${{ github.event.pull_request.head.ref }}"
          exit 1